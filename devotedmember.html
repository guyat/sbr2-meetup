<html lang="ja">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 背景固定レイヤー -->
    <div class="background-layer"></div>

    <!-- 全体ラッパー -->
    <div class="site-wrapper">

        <!-- ヘッダー -->
        <header class="site-header">
            <div class="header-inner header-inner-menu">
                <div class="site-logo">
                    <a href="index.html">SBR2交流会 特設サイト</a>
                </div>
        
                <nav class="header-nav header-menu-nav" aria-label="ヘッダーナビゲーション">
                    <ul class="header-nav-list header-menu-list">
                        <li><a href="sitemap.html">サイトマップ</a></li>
        
                        <li class="header-menu-item">
                            <details class="header-dropdown">
                                <summary>ルール</summary>
                                <div class="header-dropdown-panel">
                                    <a href="rule.html">交流会ルール</a>
                                    <a href="pair.html">戦力均衡ペア戦プチ大会ルール</a>
                                </div>
                            </details>
                        </li>
        
                        <li class="header-menu-item">
                            <details class="header-dropdown">
                                <summary>その他コンテンツ</summary>
                                <div class="header-dropdown-panel">
                                    <a href="devotedmember.html">常連名簿</a>
                                    <a href="combo.html">誘爆技講座</a>
                                    <a href="fgplay.html">名場面・珍場面集</a>
                                    <a href="faq.html">よくある質問 FAQ</a>
                                    <a href="search.html">ページ内検索</a>
                                    <a href="event.html">大会・イベント情報</a>
                                    <a href="feedback.html">参加者インタビュー</a>
                                    <a href="glossary.html">用語集</a>
                                </div>
                            </details>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <!-- メイン -->
        <main class="main-content coming-soon-main">
            <section class="coming-soon-section">
                <div class="content-box coming-soon-box">
                    <h1 class="coming-soon-title">鋭意製作中...!!</h1>
                </div>
            </section>
        </main>


        <!-- フッター -->
        <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-links">
                    <a href="https://www.konami.com/games/bomberman/r2/jp/ja/" class="footer-link" target="_blank">SBR2公式サイト</a>
                    <a href="https://www.youtube.com/user/GuystMarnonce" class="footer-link" target="_blank">主催者YouTubeチャンネル</a>
                    <a href="https://x.com/Guyst_Marnonce" class="footer-link" target="_blank">主催者X（Twitter）</a>
                    <a href="https://docs.google.com/spreadsheets/d/1me0O5U3mfCUWeh6bFiSn7yxI5rq0dbSLIO38nxFjFEs/edit?usp=sharing"
                        class="footer-link" target="_blank">交流会データまとめ</a>
                    <a href="https://www.youtube.com/playlist?list=PL0i5qplbMVFnaj_45A642adiddO8tWUbD" class="footer-link"
                        target="_blank">アーカイブ</a>
                </div>
            </div>
        </footer>

    </div>

    <script>
        const headerDropdowns = document.querySelectorAll('.header-dropdown');

        headerDropdowns.forEach((dropdown) => {
            dropdown.addEventListener('toggle', () => {
                if (!dropdown.open) return;

                headerDropdowns.forEach((otherDropdown) => {
                    if (otherDropdown !== dropdown) {
                        otherDropdown.open = false;
                    }
                });
            });
        });

        document.addEventListener('pointerdown', (event) => {
            const clickedInsideDropdown = event.target.closest('.header-dropdown');

            if (clickedInsideDropdown) {
                return;
            }

            headerDropdowns.forEach((dropdown) => {
                dropdown.open = false;
            });
        }, true);
    </script>

</body>

</html>
